---
- name: Configure Ubuntu homelab server
  hosts: homelab
  become: true

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install baseline packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - htop
          - ufw
          - ca-certificates
          - gnupg
          - python3
          - python3-pip
        state: present

    - name: Ensure homelab directory exists
      ansible.builtin.file:
        path: /opt/homelab
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Set default policy to deny incoming traffic
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set default policy to allow outgoing traffic
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH through firewall
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP reverse proxy traffic from Tailscale
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: "80"
        proto: tcp

    - name: Enable firewall
      community.general.ufw:
        state: enabled
